<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tanchiki Prototype</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-screen" aria-labelledby="title">
        <aside class="side-panel controls-panel game-copy" aria-label="Controls and quick start">
          <p class="eyebrow">Prototype</p>
          <h1 id="title">Tanchiki</h1>
          <p>Destroy the enemy base, then choose one upgrade before the next fight.</p>
          <div class="demo-brief" aria-label="Demo quick start">
            <p><strong>Move</strong> WASD or Arrow keys</p>
            <p><strong>Fire</strong> Space</p>
            <p><strong>Continue</strong> N or Enter</p>
            <p><strong>Restart</strong> R</p>
          </div>
        </aside>

        <section class="play-panel" aria-label="Mission playfield">
          <div class="status-bar" aria-label="Live mission status">
            <div id="status" class="status" aria-live="polite"></div>
          </div>
          <canvas id="game" width="720" height="528" aria-label="Playable Tanchiki canvas"></canvas>
        </section>

        <aside class="side-panel progression-panel" aria-label="Upgrades and rewards">
          <div class="progression-panel__intro">
            <p class="eyebrow">Progression</p>
            <h2>Upgrades</h2>
            <p id="progression-empty" class="progression-panel__empty">Win the mission to choose an upgrade.</p>
          </div>
          <div id="progression-summary" class="progression-summary" aria-label="Campaign progression"></div>
          <section id="upgrade-panel" class="upgrade-panel" aria-labelledby="upgrade-title" hidden>
            <div class="upgrade-panel__copy">
              <p class="eyebrow">Upgrade ready</p>
              <h2 id="upgrade-title">Choose one upgrade</h2>
              <p id="upgrade-context" class="upgrade-panel__context"></p>
            </div>
            <div id="upgrade-choices" class="upgrade-choices"></div>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
