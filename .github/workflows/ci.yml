name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Test, build, and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Run lint
        run: npm run lint
