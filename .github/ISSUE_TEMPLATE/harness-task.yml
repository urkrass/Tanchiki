name: Harness task
description: Create a docs, prompts, policies, checklist, template, or workflow task.
title: "[Harness]: "
labels: ["harness", "role:coder", "type:harness", "risk:low", "validation:harness"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Harness files or workflows that may change.
    validations:
      required: true
  - type: textarea
    id: do-not-touch
    attributes:
      label: Do-not-touch list
      value: |
        - Do not edit gameplay source.
        - Do not modify src/game/movement.js.
        - Do not change game behavior or progression behavior.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests required
      value: |
        - npm test
        - npm run build
        - npm run lint
        - git diff --check
    validations:
      required: true
  - type: textarea
    id: manual-qa
    attributes:
      label: Manual QA
    validations:
      required: true
  - type: dropdown
    id: visible-ui
    attributes:
      label: Visible UI expectation
      options:
        - "No visible UI change"
        - "Visible workflow copy only"
    validations:
      required: true
  - type: textarea
    id: conflict-risk
    attributes:
      label: Central-file conflict risk
    validations:
      required: true
